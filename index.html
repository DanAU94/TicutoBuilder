<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ticuto Room Builder</title>
<style>
:root{--bg:#0c2f2f;--grid:rgba(80,180,170,.18);--panel:#f5d39a;--panel-dark:#b47a33;--panel-light:#ffe8ba;--text:#3c2207}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;user-select:none}
#app{display:grid;grid-template-columns:320px 1fr;height:100vh;width:100vw}
aside{background:var(--panel);border-right:4px solid var(--panel-dark);padding:14px;overflow-y:auto;box-shadow:5px 0 20px rgba(0,0,0,.25);z-index:3}
h1{font-size:18px;margin:0 0 8px;text-align:center}
.help{font-size:13px;line-height:1.35;background:var(--panel-light);border:2px solid #d39a4c;padding:10px;margin-bottom:12px}
.section-title{font-weight:bold;margin:14px 0 8px;font-size:14px}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.tile-btn{width:66px;height:58px;border:2px solid #d39a4c;border-radius:4px;background:#e3b873;cursor:pointer;display:grid;place-items:center;overflow:hidden;position:relative}
.tile-btn.active{outline:3px solid #2b7cff;background:#ffe2a5}
.tile-btn img{max-width:58px;max-height:48px;object-fit:contain;image-rendering:pixelated;pointer-events:none}
.variant-count{position:absolute;right:3px;bottom:3px;background:rgba(0,0,0,.65);color:#fff;font-size:10px;line-height:1;padding:3px 4px;border-radius:4px;pointer-events:none}
button,label,input,select{font-family:inherit}
details.tools-panel{margin-top:14px;background:rgba(255,255,255,.18);border:2px solid #d39a4c;border-radius:4px;overflow:hidden}
details.tools-panel summary{cursor:pointer;font-weight:bold;padding:9px;background:var(--panel-light)}
.tool-settings{display:grid;gap:8px;padding:10px 10px 0;font-size:13px}
.tool-settings label{display:grid;grid-template-columns:1fr 90px;align-items:center;gap:8px}
.tool-settings select{width:90px;padding:5px;border:2px solid #d39a4c;background:#fff5d8;border-radius:4px}
.zoom-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.zoom-btn{background:#fff5d8;border:2px solid #d39a4c;border-radius:4px;padding:7px 4px;cursor:pointer;font-weight:bold;color:var(--text)}
.zoom-btn.active{background:#2b7cff;color:white}
.controls{display:grid;gap:8px;margin-top:12px;padding:0 10px 10px}
.controls button,.controls label{background:var(--panel-light);border:2px solid #d39a4c;color:var(--text);padding:8px;border-radius:4px;cursor:pointer;font-weight:bold;text-align:center}
.controls input[type=file]{display:none}
code{background:rgba(255,255,255,.55);padding:1px 4px;border-radius:3px}
main{position:relative;overflow:hidden}
canvas{width:100%;height:100%;display:block;cursor:default}
.hud{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.45);color:white;padding:10px 12px;border-radius:8px;font-size:13px;pointer-events:none;line-height:1.4}
</style>
</head>
<body>
<div id="app">
<aside>
<h1>Ticuto Room Builder</h1>
<div class="help">
Join <a href='http://ticuto.com/'>Ticuto</a> and let your journey begin!
</div>

<div class="section-title">Tiles</div>
<div class="tiles" id="tilePalette"></div>

<div class="section-title">Items</div>
<div class="tiles" id="itemPalette"></div>

<details class="tools-panel" open>
<summary>Tools</summary>
<div class="tool-settings">
<div class="zoom-buttons">
<button class="zoom-btn" data-zoom="0.5">0.5x</button>
<button class="zoom-btn active" data-zoom="1">1x</button>
<button class="zoom-btn" data-zoom="1.5">1.5x</button>
<button class="zoom-btn" data-zoom="2">2x</button>
</div>
</div>
<div class="controls">
<button id="eraserBtn">Eraser</button>
<button id="clearBtn">Clear Layout</button>
<button id="saveBtn">Save JSON</button>
<label>Load JSON<input type="file" id="loadFile" accept=".json" /></label>
<button id="exportBtn">Export PNG</button>
</div>
</details>
</aside>

<main>
<canvas id="canvas"></canvas>
<div class="hud" id="hud">Tile: Grass<br>Zoom: 100%</div>
</main>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const palette=document.getElementById("tilePalette");
const itemPalette=document.getElementById("itemPalette");
const hud=document.getElementById("hud");

const TILE_SETTINGS={gridW:52,gridH:26,imageW:52,imageH:39,imageLift:0};

let dpr=window.devicePixelRatio||1;
let selectedType="tile";
let selectedTile="grass";
let selectedVariant=0;
let eraser=false;
let grid=new Map();
let camera={x:650,y:180,zoom:1};
let mouse={x:0,y:0,down:false,pan:false,lastX:0,lastY:0};
let spaceHeld=false;

const tileList=[
  {id:'grass',name:'Grass',files:['1a.png','1b.png','1c.png','1d.png','1e.png']},
  {id:'dirt',name:'Dirt',files:['2a.png','2b.png','2c.png']},
  {id:'hole',name:'Hole',files:['3a.png']},
  {id:'sand',name:'Sand',files:['4a.png']},
  {id:'snow',name:'Snow',files:['5a.png']},
  {id:'water',name:'Water',files:['6a.png','6b.png','6c.png','6d.png','6e.png','6f.png','6g.png']},
  {id:'darkwater',name:'Dark Water',files:['22a.png','22b.png','22c.png','22d.png','22e.png','22f.png','22g.png']},
  {id:'ice',name:'Ice',files:['7a.png','ba.png','7c.png','7d.png','7e.png','7f.png','7g.png']},
  {id:'bridge',name:'Bridge',files:['8a.png','8b.png','8c.png','8d.png']},
  {id:'concrete',name:'Concrete',files:['9a.png','9b.png','9c.png']},
  {id:'wood',name:'Wood',files:['10a.png','10b.png','10c.png','10d.png']},
  {id:'mosaic',name:'Mosaic Tile',files:['11a.png','11b.png','11c.png','11d.png']},
  {id:'tile',name:'Tile',files:['12a.png','12b.png']},
  {id:'dot',name:'Dotted',files:['13a.png','13b.png']},
  {id:'terrazzo',name:'Terrazzo',files:['14a.png']},
  {id:'polished',name:'Polished',files:['15a.png','15b.png']},
  {id:'steel',name:'Steel',files:['16a.png']},
  {id:'inset',name:'Inset',files:['17a.png']},
  {id:'checkered',name:'Checkered',files:['18a.png']},
  {id:'starlight',name:'Starlight',files:['19a.png']},
  {id:'astralei',name:'Astralei',files:['20a.png']},
  {id:'pathend',name:'Path End',files:['21a.png','21b.png','21c.png','21d.png']},
  {id:'pathstraight',name:'Path Straight',files:['21e.png','21f.png']},
  {id:'pathsec',name:'Path Intersections',files:['21g.png','21h.png','21i.png','21j.png','21k.png']},
  {id:'pathcorn',name:'Path Corner',files:['21l.png','21m.png','21n.png','21o.png']},
  {id:'sandedge',name:'Sand Edge',files:['24a.png','24b.png','24c.png','24d.png','24e.png']},
  {id:'map',name:'Map',files:['25.png'],imageW:3591,imageH:2250},
];

const itemList=[
  {id:'longgrass',name:'Long Grass',files:['1a.png','1b.png','1c.png','1d.png'],imageW:52,imageH:65},
  {id:'ladderhole',name:'Decending Ladder',files:['2a.png','2b.png'],imageW:54,imageH:39},
  {id:'hubblearch',name:'Hubble Archway',files:['3a.png'],imageW:72,imageH:122},
  {id:'pinetree',name:'Pine Tree',files:['4a.png','4b.png','4c.png','4d.png'],imageW:76,imageH:130},
  {id:'largetree',name:'Large Tree',files:['5a.png','5b.png','5c.png','5d.png','5e.png'],imageW:127,imageH:178},
  {id:'fountain',name:'Fountain',files:['6a.png'],imageW:98,imageH:98},
  {id:'mine',name:'Mine',files:['7a.png'],imageW:159,imageH:113},
  {id:'campfire',name:'Campfire',files:['8a.png','8b.png','8c.png','8d.png','8e.png'],imageW:38,imageH:50},
  {id:'dancetile',name:'Dance Tile',files:['9a.png','9b.png','9c.png','9d.png','9e.png'],imageW:50,imageH:28},
  {id:'bboard',name:'Bulletin Board',files:['10a.png','10b.png'],imageW:94,imageH:118},
  {id:'pot',name:'Dirt Pot',files:['11a.png'],imageW:30,imageH:28},
  {id:'tmach',name:'Ticuto Machine',files:['12a.png'],imageW:139,imageH:136},
  {id:'gram',name:'Gramophone',files:['13a.png'],imageW:47,imageH:71},
  {id:'alien',name:'Alien',files:['14a.png'],imageW:41,imageH:60},
  {id:'build',name:'Building',files:['15a.png'],imageW:254,imageH:230},
];

const fallbackImagePath="tiles/fallback.png";
const itemFallbackImagePath="items/fallback.png";
const tileById=Object.fromEntries(tileList.map(t=>[t.id,t]));
const itemById=Object.fromEntries(itemList.map(t=>[t.id,t]));
const imageCache={};
const paletteImages={};

function getSettings(){return TILE_SETTINGS}
function key(x,y){return `${x},${y}`}
function parseKey(k){const [x,y]=k.split(",").map(Number);return{x,y}}
function getAssetMap(type){
 return type==="item"?itemById:tileById;
}
function getAssetList(type){
 return type==="item"?itemList:tileList;
}
function getAssetFolder(type){
 return type==="item"?"items":"tiles";
}
function getFallbackPath(type){
 return type==="item"?itemFallbackImagePath:fallbackImagePath;
}
function normalizePlacedTile(value){
 if(typeof value==="string")return{type:"tile",id:value,variant:0};
 return{type:value?.type||"tile",id:value?.id||"grass",variant:value?.variant||0};
}
function normalizeCell(value){
 if(!value)return{tile:null,item:null};

 if(value.tile!==undefined||value.item!==undefined){
  return{
   tile:value.tile||null,
   item:value.item||null
  };
 }

 const placed=normalizePlacedTile(value);

 if(placed.type==="item"){
  return{
   tile:null,
   item:{id:placed.id,variant:placed.variant}
  };
 }

 return{
  tile:{id:placed.id,variant:placed.variant},
  item:null
 };
}
function getAssetFile(type,assetId,variantIndex=0){
 const map=getAssetMap(type);
 const fallbackAsset=type==="item"?itemList[0]:tileById.grass;
 const asset=map[assetId]||fallbackAsset;
 const files=asset?.files||[];
 return files[variantIndex]||files[0]||"fallback.png";
}
function getAssetImage(type,assetId,variantIndex=0){
 const map=getAssetMap(type);
 const fallbackAsset=type==="item"?itemList[0]:tileById.grass;
 const asset=map[assetId]||fallbackAsset;
 const safeVariant=Math.max(0,Math.min(variantIndex,(asset?.files?.length||1)-1));
 const file=getAssetFile(type,asset.id,safeVariant);
 const cacheKey=`${type}:${asset.id}:${safeVariant}:${file}`;
 if(imageCache[cacheKey])return imageCache[cacheKey];
 const img=new Image();
 img.src=`${getAssetFolder(type)}/${file}?v=${Date.now()}`;
 img.onload=()=>{draw();updatePaletteImage(type,asset.id)};
 img.onerror=()=>{img.onerror=null;img.src=getFallbackPath(type)};
 imageCache[cacheKey]=img;
 return img;
}
function getTileImage(tileId,variantIndex=0){
 return getAssetImage("tile",tileId,variantIndex);
}
function resizeCanvas(){
 dpr=window.devicePixelRatio||1;
 const rect=canvas.getBoundingClientRect();
 canvas.width=rect.width*dpr;
 canvas.height=rect.height*dpr;
 ctx.setTransform(dpr,0,0,dpr,0,0);
 draw();
}
function worldToScreen(x,y){
 const s=getSettings();
 return{x:camera.x+(x-y)*(s.gridW/2)*camera.zoom,y:camera.y+(x+y)*(s.gridH/2)*camera.zoom};
}
function screenToTile(sx,sy){
 const s=getSettings();
 const x=(sx-camera.x)/camera.zoom;
 const y=(sy-camera.y)/camera.zoom;
 return{x:Math.floor((y/(s.gridH/2)+x/(s.gridW/2))/2),y:Math.floor((y/(s.gridH/2)-x/(s.gridW/2))/2)};
}
function drawImageTile(x,y,placedTileValue){
 drawImageTileToContext(ctx,x,y,placedTileValue);
}
function drawGrid(){
 ctx.save();
 ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue("--grid");
 ctx.lineWidth=1;
 for(let x=-120;x<=120;x++){
  const a=worldToScreen(x,-120),b=worldToScreen(x,120);
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
 }
 for(let y=-120;y<=120;y++){
  const a=worldToScreen(-120,y),b=worldToScreen(120,y);
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
 }
 ctx.restore();
}
function drawHover(){
 const t=screenToTile(mouse.x,mouse.y);
 const p=worldToScreen(t.x,t.y);
 const s=getSettings();
 const w=s.gridW*camera.zoom;
 const h=s.gridH*camera.zoom;
 const offsetY=selectedType==="item"?0:(s.imageH-s.gridH)*camera.zoom;
 ctx.save();
 ctx.strokeStyle=eraser?"#ff5252":"#ffffff";
 ctx.lineWidth=2;
 ctx.globalAlpha=.85;
 ctx.beginPath();
 ctx.moveTo(p.x,p.y-h/2+offsetY);
 ctx.lineTo(p.x+w/2,p.y+offsetY);
 ctx.lineTo(p.x,p.y+h/2+offsetY);
 ctx.lineTo(p.x-w/2,p.y+offsetY);
 ctx.closePath();
 ctx.stroke();
 ctx.restore();
}
function draw(){
 const rect=canvas.getBoundingClientRect();
 ctx.clearRect(0,0,rect.width,rect.height);
 drawGrid();

 const sorted=[...grid.entries()].sort((a,b)=>{
  const pa=parseKey(a[0]),pb=parseKey(b[0]);
  return(pa.x+pa.y)-(pb.x+pb.y);
 });

 // Draw floor tiles first.
 for(const [k,cell] of sorted){
  const {x,y}=parseKey(k);
  const normalCell=normalizeCell(cell);

  if(normalCell.tile){
   drawImageTile(x,y,{type:"tile",...normalCell.tile});
  }
 }

 // Draw items second so they sit on top.
 for(const [k,cell] of sorted){
  const {x,y}=parseKey(k);
  const normalCell=normalizeCell(cell);

  if(normalCell.item){
   drawImageTile(x,y,{type:"item",...normalCell.item});
  }
 }

 drawHover();
 updateHud();
}
function updateHud(){
 const map=getAssetMap(selectedType);
 const asset=map[selectedTile]||(selectedType==="item"?itemList[0]:tileById.grass);
 const totalVariants=asset?.files?.length||1;
 const variantLabel=totalVariants>1?` ${selectedVariant+1}/${totalVariants}`:"";
 const label=selectedType==="item"?"Item":"Tile";
 hud.innerHTML=`${label}: ${eraser?"Eraser":asset.name+variantLabel}<br>Zoom: ${Math.round(camera.zoom*100)}%`;
}
function placeAtMouse(){
 const t=screenToTile(mouse.x,mouse.y);
 const k=key(t.x,t.y);
 const cell=normalizeCell(grid.get(k));

 if(eraser){
  if(selectedType==="item"){
   cell.item=null;
  }else{
   cell.tile=null;
  }

  if(!cell.tile&&!cell.item){
   grid.delete(k);
  }else{
   grid.set(k,cell);
  }
 }else{
  cell[selectedType]={
   id:selectedTile,
   variant:selectedVariant
  };

  grid.set(k,cell);
 }

 draw();
}
function updatePaletteImage(type,assetId){
 const imgEl=paletteImages[`${type}:${assetId}`];
 if(!imgEl)return;
 const variant=selectedType===type&&selectedTile===assetId?selectedVariant:0;
 const img=getAssetImage(type,assetId,variant);
 if(imgEl.src!==img.src)imgEl.src=img.src;
}
function updateActivePaletteButton(){
 document.querySelectorAll(".tile-btn").forEach(btn=>{
  btn.classList.toggle("active",btn.dataset.type===selectedType&&btn.dataset.tileId===selectedTile);
 });
 updatePaletteImage(selectedType,selectedTile);
}
function buildPaletteSection(container,type,list){
 container.innerHTML="";
 for(const asset of list){
  const btn=document.createElement("button");
  btn.className="tile-btn";
  btn.title=asset.name;
  btn.dataset.type=type;
  btn.dataset.tileId=asset.id;
  const preview=document.createElement("img");
  preview.alt=asset.name;
  preview.src=getAssetImage(type,asset.id,0).src;
  paletteImages[`${type}:${asset.id}`]=preview;
  btn.appendChild(preview);
  if((asset.files?.length||1)>1){
   const badge=document.createElement("span");
   badge.className="variant-count";
   badge.textContent=asset.files.length;
   btn.appendChild(badge);
  }
  btn.onclick=()=>{
   if(selectedType===type&&selectedTile===asset.id){
    const totalVariants=asset.files?.length||1;
    selectedVariant=(selectedVariant+1)%totalVariants;
   }else{
    selectedType=type;
    selectedTile=asset.id;
    selectedVariant=0;
   }
   eraser=false;
   updateActivePaletteButton();
   draw();
  };
  container.appendChild(btn);
 }
}
function buildPalette(){
 buildPaletteSection(palette,"tile",tileList);
 buildPaletteSection(itemPalette,"item",itemList);
 updateActivePaletteButton();
}
canvas.addEventListener("mousemove",e=>{
 const rect=canvas.getBoundingClientRect();
 mouse.x=e.clientX-rect.left;
 mouse.y=e.clientY-rect.top;
 if(mouse.down&&mouse.pan){
  camera.x+=e.clientX-mouse.lastX;
  camera.y+=e.clientY-mouse.lastY;
 }else if(mouse.down&&!mouse.pan){
  placeAtMouse();
 }
 mouse.lastX=e.clientX;
 mouse.lastY=e.clientY;
 draw();
});
canvas.addEventListener("mousedown",e=>{
 mouse.down=true;
 mouse.lastX=e.clientX;
 mouse.lastY=e.clientY;
 mouse.pan=e.button===1||spaceHeld;
 if(!mouse.pan)placeAtMouse();
});
window.addEventListener("mouseup",()=>{mouse.down=false;mouse.pan=false});
canvas.addEventListener("contextmenu",e=>{
 e.preventDefault();
 const oldEraser=eraser;
 eraser=true;
 placeAtMouse();
 eraser=oldEraser;
});
window.addEventListener("keydown",e=>{if(e.code==="Space")spaceHeld=true});
window.addEventListener("keyup",e=>{if(e.code==="Space")spaceHeld=false});
function updateZoomButtons(){
 document.querySelectorAll(".zoom-btn").forEach(btn=>{
  btn.classList.toggle("active",Number(btn.dataset.zoom)===camera.zoom);
 });
}
document.querySelectorAll(".zoom-btn").forEach(btn=>{
 btn.onclick=()=>{
  camera.zoom=Number(btn.dataset.zoom);
  updateZoomButtons();
  draw();
 };
});
document.getElementById("eraserBtn").onclick=()=>{eraser=!eraser;draw()};
document.getElementById("clearBtn").onclick=()=>{if(confirm("Clear the whole layout?")){grid.clear();draw()}};
document.getElementById("saveBtn").onclick=()=>{
 const data={version:7,settings:getSettings(),camera,tiles:[...grid.entries()].map(([pos,cell])=>{
  const {x,y}=parseKey(pos);
  const normalCell=normalizeCell(cell);

  return{
   x,
   y,
   tile:normalCell.tile,
   item:normalCell.item
  };
 })};

 const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 const url=URL.createObjectURL(blob);
 download(url,"layout.json");
 URL.revokeObjectURL(url);
};
document.getElementById("loadFile").onchange=e=>{
 const file=e.target.files[0];
 if(!file)return;
 const reader=new FileReader();
 reader.onload=()=>{
  try{
   const data=JSON.parse(reader.result);
   if(data.camera){camera=data.camera;}
   grid.clear();
   for(const item of data.tiles||[]){
    if(item.tile!==undefined||item.item!==undefined){
     grid.set(key(item.x,item.y),{
      tile:item.tile||null,
      item:item.item||null
     });
    }else{
     // Old save format support.
     const type=item.type==="item"?"item":"tile";
     const id=item.id||item.tile||"grass";
     const variant=item.variant||0;
     const cell={tile:null,item:null};
     cell[type]={id,variant};
     grid.set(key(item.x,item.y),cell);
    }
   }
   draw();
  }catch{alert("Could not load that JSON file.")}
 };
 reader.readAsText(file);
};
function drawImageTileToContext(targetCtx,x,y,placedTileValue){
 const placed=normalizePlacedTile(placedTileValue);
 const map=getAssetMap(placed.type);
 const fallbackAsset=placed.type==="item"?itemList[0]:tileById.grass;
 const asset=map[placed.id]||fallbackAsset;
 const img=getAssetImage(placed.type,asset.id,placed.variant);
 const p=worldToScreen(x,y);
 const s=getSettings();
 const assetW=asset?.imageW||s.imageW;
 const assetH=asset?.imageH||s.imageH;
 const w=assetW*camera.zoom;
 const h=assetH*camera.zoom;
 const lift=(asset?.imageLift??s.imageLift)*camera.zoom;
 const drawX=Math.round(p.x-w/2);
 let drawY;

 if(placed.type==="item"){
  // Items are bottom-anchored so the bottom of the PNG sits on the tile surface.
  drawY=Math.round(p.y+(s.gridH*camera.zoom)/2-h-lift);
 }else{
  // Floor tiles use the normal tile anchor.
  const extraHeight=(assetH-s.imageH)*camera.zoom;
  drawY=Math.round(p.y-(s.gridH*camera.zoom)/2-lift-extraHeight);
 }

 targetCtx.imageSmoothingEnabled=false;
 targetCtx.drawImage(img,drawX,drawY,w,h);
}

document.getElementById("exportBtn").onclick=()=>{
 try{
  const exportCanvas=document.createElement("canvas");
  const exportCtx=exportCanvas.getContext("2d");
  const rect=canvas.getBoundingClientRect();

  exportCanvas.width=canvas.width;
  exportCanvas.height=canvas.height;

  exportCtx.setTransform(dpr,0,0,dpr,0,0);
  exportCtx.clearRect(0,0,rect.width,rect.height);
  exportCtx.imageSmoothingEnabled=false;

  const sorted=[...grid.entries()].sort((a,b)=>{
   const pa=parseKey(a[0]),pb=parseKey(b[0]);
   return(pa.x+pa.y)-(pb.x+pb.y);
  });

  // Export floor tiles first.
  for(const [k,cell] of sorted){
   const {x,y}=parseKey(k);
   const normalCell=normalizeCell(cell);

   if(normalCell.tile){
    drawImageTileToContext(exportCtx,x,y,{type:"tile",...normalCell.tile});
   }
  }

  // Export items on top.
  for(const [k,cell] of sorted){
   const {x,y}=parseKey(k);
   const normalCell=normalizeCell(cell);

   if(normalCell.item){
    drawImageTileToContext(exportCtx,x,y,{type:"item",...normalCell.item});
   }
  }

  const url=exportCanvas.toDataURL("image/png");
  download(url,"layout.png");
 }catch(error){
  alert("Export failed. Open this through localhost, not directly from the file. Example: py -m http.server 8000");
 }
};
function download(url,filename){
 const a=document.createElement("a");
 a.href=url;
 a.download=filename;
 document.body.appendChild(a);
 a.click();
 a.remove();
}
async function loadDefaultLayout(){
 try{
  const res = await fetch("layout.json");
  if(!res.ok) return;

  const data = await res.json();

  if(data.camera){
   camera = data.camera;
   
  }

  grid.clear();

  for(const item of data.tiles || []){
   if(item.tile !== undefined || item.item !== undefined){
    grid.set(key(item.x,item.y),{
     tile:item.tile || null,
     item:item.item || null
    });
   }else{
    const type=item.type==="item"?"item":"tile";
    const id=item.id||item.tile||"grass";
    const variant=item.variant||0;
    const cell={tile:null,item:null};
    cell[type]={id,variant};
    grid.set(key(item.x,item.y),cell);
   }
  }

  draw();
 }catch(err){
  console.log("No default layout found.");
 }
}
buildPalette();

resizeCanvas();
window.addEventListener("resize",resizeCanvas);
loadDefaultLayout();
</script>
